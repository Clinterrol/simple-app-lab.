<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Clint Errol Nebrao</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <nav>
    <span class="logo">CEN<mark>.</mark></span>
    <button id="hamburger">&#9776;</button>
    <ul id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section id="contact" style="padding-top: 7rem; max-width: 100%;">
    <div style="max-width: 68rem; margin: 0 auto;">
      <small>03 — Contact</small>
      <h2>Let's build something together.</h2>
      <p>Open to freelance projects, full-time roles, and interesting collaborations.</p>
      <form onsubmit="return false;">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" placeholder="Tell me about your project..."></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
      <ul class="socials">
        <li><a href="#">GitHub</a></li>
        <li><a href="#">LinkedIn</a></li>
        <li><a href="#">Twitter</a></li>
      </ul>
    </div>
  </section>

  <footer>
    <p>© 2025 Clint Errol Nebrao — Built with HTML, CSS & ☕</p>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
  </script>
</body>
</html>
